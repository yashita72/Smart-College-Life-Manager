<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart College Life Manager</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>

<body>

  <div class="page">

    <h1 class="app-title">Smart College Life Manager</h1>
    <p class="tagline">Organize your academic life smartly</p>

    <!-- LOGIN / SIGNUP -->
    <div id="auth" class="card">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <div class="btn-group">
        <button type="button" onclick="signup()">Sign Up</button>
        <button type="button" onclick="login()">Login</button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="card" style="display:none;">
      <h2>Dashboard</h2>

      <input id="task" placeholder="Task title">

      <select id="type">
        <option>Assignment</option>
        <option>Exam</option>
        <option>Event</option>
      </select>

      <input type="datetime-local" id="deadline">

      <select id="priority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <button type="button" onclick="addTask()">Add Task</button>
      <button type="button" onclick="openCalendar()">Open Google Calendar</button>

      <ul id="tasks"></ul>

      <button type="button" class="logout" onclick="logout()">Logout</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
